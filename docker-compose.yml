services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: ada-litellm
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    env_file:
      - .env
    command:
      - "--config=/app/config.yaml"
      - "--port"
      - "4000"
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  tool-runtime:
    build: ./tool_runtime
    container_name: ada-tools
    volumes:
      - ./chat/custom_tools:/app/custom_tools
      - ada_tool_venv:/app/venv
    environment:
      - TOOLS_DIR=/app/custom_tools
      - VENV_PATH=/app/venv
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  chat:
    build: ./chat
    container_name: ada-chat
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./chat/custom_tools:/app/custom_tools
      - ./chat/staging:/app/staging
    environment:
      - LITELLM_URL=http://litellm:4000
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - LITE_MODEL=${LITE_MODEL:-}
      - TOOL_CREATOR_MODEL=${TOOL_CREATOR_MODEL:-}
      - CHAT_MODEL=${CHAT_MODEL:-}
      - SECOND_MODEL=${SECOND_MODEL:-}
      - TOOL_RUNTIME_URL=http://tool-runtime:8090
      - ADA_LOG_LEVEL=${ADA_LOG_LEVEL:-INFO}
      - ADA_LOG_MAX_BODY=${ADA_LOG_MAX_BODY:-32000}
    depends_on:
      litellm:
        condition: service_healthy
      tool-runtime:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ada_tool_venv:
