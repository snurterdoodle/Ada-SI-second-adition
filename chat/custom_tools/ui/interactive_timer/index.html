<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Timer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Timers</h1>
        <div class="create-form">
            <input type="text" id="label-input" placeholder="Timer Name (e.g., Pasta)">
            <input type="number" id="duration-input" placeholder="Seconds (e.g., 600)">
            <button id="create-btn">Add Timer</button>
        </div>
        <div id="timers-list"></div>
    </div>
    <script src="/static/skill-sdk.js"></script>
    <script src="app.js"></script>
</body>
</html>
